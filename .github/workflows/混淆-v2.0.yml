name: js代码混淆器v2.0

on:
  workflow_dispatch:

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 获取完整的 Git 历史记录

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16"

      - name: Install dependencies
        run: npm install -g javascript-obfuscator

      - name: Obfuscate code
        run: |
          javascript-obfuscator index.js --output _worker.js \
          --compact true \
          --identifier-names-generator hexadecimal \
          --rename-globals false \
          --reserved-names "connect,fetch,Response,WebSocketPair,Blob,ReadableStream,WritableStream,TextDecoder,URL,URLSearchParams,atob,btoa" \
          --reserved-strings "cloudflare:sockets,Upgrade,websocket,GET,text/html; charset=utf-8,text/plain; charset=utf-8" \
          --string-array true \
          --string-array-encoding 'base64' \
          --string-array-threshold 0.8 \
          --control-flow-flattening false \
          --dead-code-injection false \
          --transform-object-keys false

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _worker.js
          git status  # 确保文件已经被修改
          git commit -m "Obfuscate _worker.js" || echo "No changes to commit"

      - name: Debug push branch
        run: |
             echo "Pushing to branch: ${{ github.ref }}"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # 推荐使用默认的 GITHUB_TOKEN
          branch: main  # 推送到 "main" 分支
  
  cleanup-workflow-runs:
    runs-on: ubuntu-latest
    needs: obfuscate

    steps:
      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Delete completed workflow runs
        env:
          GH_TOKEN: ${{ secrets.GT_TOKEN }}
        run: |
          echo "Fetching completed workflow runs..."
          RUN_IDS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100" \
            | jq '.workflow_runs[] | select(.status == "completed") | .id')
          for run_id in $RUN_IDS; do
            echo "Deleting run ID: $run_id"
            curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id"
          done
