name: js代码混淆器

on:
  workflow_dispatch:

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 获取完整的 Git 历史记录

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16"

      - name: Install dependencies
        run: npm install -g javascript-obfuscator

      - name: Obfuscate code
        run: |
          javascript-obfuscator index.js --output _worker.js \
          --compact true \
          --control-flow-flattening true \           # 打乱代码的正常执行顺序，用复杂的 switch-case 循环将代码结构扁平化
          --control-flow-flattening-threshold 0.8 \  # 设得极低（如 0.1 到 0.2），只混淆 10%~20% 的关键代码
          --dead-code-injection-threshold 0.8 \      # 是一个控制死代码注入频率和比例的参数。它的取值范围是 0 到 1（即 0% 到 100%）
          --identifier-names-generator hexadecimal \
          --rename-globals true \                    # 将全局范围内的变量、函数名也进行混淆。
          --string-array true \                      # 将代码中所有的字符串（包括 URL、错误信息、配置项）抽离出来，放进一个统一的全局数组中，在运行时通过函数索引调用
          --string-array-encoding 'rc4' \            # 可选值：'none'（不加密，仅数组化） / 'base64'（Base64 编码） / 'rc4'（RC4 强加密）
          --string-array-threshold 0.8 \             # 控制有多少比例的字符串会被放入混淆数组。1 代表 100% 混淆，0.75 代表 75%。
          --transform-object-keys true \

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _worker.js
          git status  # 确保文件已经被修改
          git commit -m "Obfuscate _worker.js" || echo "No changes to commit"

      - name: Debug push branch
        run: |
             echo "Pushing to branch: ${{ github.ref }}"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # 推荐使用默认的 GITHUB_TOKEN
          branch: main  # 推送到 "main" 分支
